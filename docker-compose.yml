version: '3'

services:

  selenium:
    image: selenium/standalone-chrome
    shm_size: 2gb
    ports:
      - "4444:4444"
    environment:
      - SE_NODE_MAX_SESSIONS=2
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true

  tests:
    build: .
    depends_on:
      - selenium
    environment:
      - SELENIUM_REMOTE_URL=http://selenium:4444/wd/hub
    volumes:
      - .:/app
    working_dir: /app
    command: pytest -n 2 --reruns 4 --reruns-delay 5 --alluredir=allure-results --html=report.html --self-contained-html
